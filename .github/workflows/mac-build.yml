name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          pip install -r requirements.txt
          npm install --global create-dmg

      - name: Build app with py2app
        run: |
          python setup.py py2app

      - name: Verify build
        run: |
          ls -la dist/
          test -d dist/*.app

      - name: Create DMG
        env:
          APP_NAME: "Zen Macro"
        run: |
          DMG_NAME="${APP_NAME// /-}-Mac.dmg"
          TEMP_DMG="dist/temp.dmg"

          hdiutil create -volname "${APP_NAME} Installer" \
            -srcfolder "dist/${APP_NAME}.app" \
            -ov -format UDRW \
            "$TEMP_DMG"

          MOUNT_DIR=$(hdiutil attach "$TEMP_DMG" | grep -oE '/Volumes/.+$')

          ln -s /Applications "$MOUNT_DIR/Applications"

          osascript <<EOF
          tell application "Finder"
            tell disk "${APP_NAME} Installer"
              open
              set current view of container window to icon view
              set toolbar visible of container window to false
              set statusbar visible of container window to false
              set bounds of container window to {200, 120, 1000, 520}
              set theViewOptions to icon view options of container window
              set icon size of theViewOptions to 100
              set position of item "${APP_NAME}.app" of container window to {200, 190}
              set position of item "Applications" of container window to {600, 185}
              set extension hidden of item "${APP_NAME}.app" of container window to true
              update without registering applications
              close
            end tell
          end tell
          EOF

          hdiutil detach "$MOUNT_DIR"
          hdiutil convert "$TEMP_DMG" -format UDZO -o "dist/$DMG_NAME"
          rm "$TEMP_DMG"


      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.dmg
          retention-days: 14

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
