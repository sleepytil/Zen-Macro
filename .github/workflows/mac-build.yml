name: Build macOS App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Set up Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          pip install -r requirements.txt
          npm install --global create-dmg

      - name: Build app with py2app
        run: |
          python setup.py py2app

      - name: Verify build
        run: |
          ls -la dist/
          test -d dist/*.app

      - name: Create DMG
        run: |
          APP_NAME=$(ls dist/ | grep '\.app$' | head -1 | sed 's/\.app$//')
          create-dmg \
            --volname "Zen Macro Installer" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "Zen Macro.app" 200 190 \
            --hide-extension "Zen Macro.app" \
            --app-drop-link 600 185 \
            "Zen-Macro-Mac.dmg" \
            "dist/Zen Macro.app"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/*.dmg
          retention-days: 14

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
